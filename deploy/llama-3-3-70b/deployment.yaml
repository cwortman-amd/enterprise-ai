# Standalone AIM deployment for meta-llama/Llama-3.3-70B-Instruct.
# Based on the AIM deployment guide's Kubernetes manifest, adapted to:
#   - target our MI355x hardware (AIM_GPU_MODEL=MI355X)
#   - 1 GPU (TP1), matching our operator template
#   - inject HF_TOKEN for the gated meta-llama repo
#   - persist the model cache across restarts
#
# Apply with: kubectl apply -f deploy/llama-3-3-70b/ -n default
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-3-3-70b-aim
  namespace: default
  labels:
    app: llama-3-3-70b-aim
spec:
  progressDeadlineSeconds: 3600
  replicas: 1
  selector:
    matchLabels:
      app: llama-3-3-70b-aim
  template:
    metadata:
      labels:
        app: llama-3-3-70b-aim
    spec:
      containers:
        - name: llama-3-3-70b-aim
          image: amdenterpriseai/aim-meta-llama-llama-3-3-70b-instruct:0.11.1
          imagePullPolicy: Always
          env:
            - name: AIM_ENGINE
              value: "vllm"
            - name: AIM_GPU_MODEL
              value: "MI355X"
            - name: AIM_GPU_COUNT
              value: "1"
            - name: AIM_PRECISION
              value: "auto"
            - name: AIM_METRIC
              value: "latency"
            - name: AIM_LOG_LEVEL_ROOT
              value: "INFO"
            - name: AIM_LOG_LEVEL
              value: "INFO"
            - name: AIM_PORT
              value: "8000"
            # Llama-3.3-70B is gated; token required to download weights.
            # optional:true lets the pod start when the model is pre-cached.
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              memory: "32Gi"
              cpu: "8"
              amd.com/gpu: "1"
            limits:
              memory: "32Gi"
              cpu: "8"
              amd.com/gpu: "1"
          startupProbe:
            httpGet:
              path: /v1/models
              port: http
            periodSeconds: 10
            failureThreshold: 360
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /v1/models
              port: http
          volumeMounts:
            - name: model-cache
              mountPath: /workspace/model-cache
            - name: ephemeral-storage
              mountPath: /tmp
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: llama-3-3-70b-model-cache
        - name: ephemeral-storage
          emptyDir:
            sizeLimit: 256Gi
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 32Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llama-3-3-70b-model-cache
  namespace: default
  labels:
    app: llama-3-3-70b-aim
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 200Gi
