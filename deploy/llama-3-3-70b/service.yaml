# ClusterIP service fronting the Llama-3.3-70B AIM deployment.
# Reach it locally with:
#   kubectl port-forward service/llama-3-3-70b-aim 8000:80 -n default
# then curl http://localhost:8000/v1/completions
apiVersion: v1
kind: Service
metadata:
  name: llama-3-3-70b-aim
  namespace: default
  labels:
    app: llama-3-3-70b-aim
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000
  selector:
    app: llama-3-3-70b-aim
