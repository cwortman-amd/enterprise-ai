# ClusterIP service fronting the GPT-OSS-120B AIM deployment.
# Reach it locally with:
#   kubectl port-forward service/gpt-oss-120b-aim 8000:80 -n default
# then curl http://localhost:8000/v1/completions
apiVersion: v1
kind: Service
metadata:
  name: gpt-oss-120b-aim
  namespace: default
  labels:
    app: gpt-oss-120b-aim
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8000
  selector:
    app: gpt-oss-120b-aim
