apiVersion: aim.silogen.ai/v1alpha1
kind: AIMModelCache
metadata:
  name: openai-gpt-oss-120b
  namespace: default
spec:
  runtimeConfigName: default
  size: 500Gi
  sourceUri: hf://openai/gpt-oss-120b
  modelDownloadImage: gpt-oss-downloader:hf-transfer
  env:
    - name: HF_TOKEN
      valueFrom:
        secretKeyRef:
          name: hf-token
          key: token
          optional: true
    - name: HUGGING_FACE_HUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: hf-token
          key: token
          optional: true

